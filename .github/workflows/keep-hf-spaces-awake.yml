name: Keep HF Spaces Awake

on:
  schedule:
    - cron: '*/10 * * * *'     # Every 10 minutes (recommended for free Spaces)
  workflow_dispatch:           # Allows manual trigger from GitHub

jobs:
  ping-spaces:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Multiple Hugging Face Spaces
        run: |
          echo "🚀 Starting pings at $(date)"
          
          # HF Space URLs
          SPACES=(
            "https://huggingface.co/spaces/Jetherruns/Movies-Recommenders"
            "https://huggingface.co/spaces/Jetherruns/tangkhul-translator"
          )

          for url in "${SPACES[@]}"; do
            echo "Pinging → $url"
            if curl -I -L --fail --max-time 20 --silent "$url" > /dev/null; then
              echo "✅ Success: $url"
            else
              echo "⚠️  Failed: $url"
            fi
          done

          echo "✅ All pings completed at $(date)"
