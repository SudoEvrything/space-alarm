name: Keep HF Spaces Awake
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping-spaces:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Multiple Hugging Face Spaces
        run: |
          echo "🚀 Starting pings at $(date)"

          SPACES=(
            "https://jetherruns-tangkhul-translator.hf.space"
          )

          for url in "${SPACES[@]}"; do
            echo "Pinging → $url"
            STATUS=$(curl -L --max-time 60 --silent --write-out "%{http_code}" \
              -H "User-Agent: GitHub-Actions-KeepAwake" \
              -o /dev/null "$url")
            echo "  HTTP status: $STATUS"
            if [[ "$STATUS" -ge 200 && "$STATUS" -lt 400 ]]; then
              echo "  ✅ Success: $url"
            else
              echo "  ⚠️  Unexpected status $STATUS for $url"
            fi
          done

          echo "✅ All pings completed at $(date)"
